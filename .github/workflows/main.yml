name: Deploy to VPS

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to VPS using appleboy/ssh-action
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            # Load Node version manager
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use ${{ vars.NODE_VERSION }}

            # Define project path
            PROJECT_DIR="/home/${{ secrets.VPS_USER }}/public_html/hkconstructionapi"

            if [ ! -d "$PROJECT_DIR" ]; then
              echo "❌ Error: Project directory $PROJECT_DIR does not exist!"
              exit 1
            fi

            echo "📂 Moving to project directory..."
            cd $PROJECT_DIR

            echo "🔄 Pulling latest code..."
            git pull origin main

            echo "📦 Installing dependencies..."
            npm install

            echo "🏗️ Building project..."
            npm run build

            echo "🛑 Stopping backend if running..."
            pm2 stop hk-api || true

            echo "⏳ Waiting for old connections to close..."
            sleep 5

            echo "🧹 Checking for any leftover process using port 3535..."
            PID=$(lsof -t -i :3535 || true)
            if [ -n "$PID" ]; then
              echo "⚠️ Found process on port 3535 (PID: $PID). Killing it..."
              kill -9 $PID || true
              sleep 2
            else
              echo "✅ Port 3535 is free."
            fi

            echo "🚀 Starting backend cleanly..."
            # pm2 start build/index.js --name "hk-api"
            pm2 start ecosystem.config.js

            echo "💾 Saving PM2 process list..."
            pm2 save

            echo "✅ Deployment complete!"

