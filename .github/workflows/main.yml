name: Deploy to VPS

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to VPS using appleboy/ssh-action
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            # Load Node version manager
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use ${{ vars.NODE_VERSION }}

            PROJECT_DIR="/home/${{ secrets.VPS_USER }}/public_html/hkconstructionapi"

            if [ ! -d "$PROJECT_DIR" ]; then
              echo "❌ Error: Project directory $PROJECT_DIR does not exist  !"
              exit 1
            fi

            echo "📂 Moving to project directory..."
            cd $PROJECT_DIR

            echo "🔄 Pulling latest code..."
            git pull origin main

            echo "📦 Installing dependencies..."
            npm install

            echo "🧹 Cleaning old build..."
            rm -rf build

            echo "🏗️ Building project..."
            npm run build

            echo "🛑 Stopping backend if running..."
            pm2 delete hk-api || true

            echo "⏳ Waiting..."
            sleep 3

            echo "🚀 Starting backend..."
            pm2 start build/index.js --name hk-api

            echo "💾 Saving PM2..."
            pm2 save

echo "✅ Deployment complete!"

